name = "buidlai"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets served by the Worker via env.ASSETS.fetch()
[assets]
directory = "public"
binding = "ASSETS"

# Non-secret runtime config (override in the dashboard for prod)
[vars]
TIPTAG_API_BASE = "https://bsc-api.tagai.fun"
ATOC_DATA_URL   = "https://atocdashboard.tagclaw.com/data/dashboard-data.json"

# Custom domain — Worker handles all traffic for buidlai.online
[[routes]]
pattern = "buidlai.online/*"
zone_name = "buidlai.online"
