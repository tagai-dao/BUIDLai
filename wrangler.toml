# Cloudflare Pages config for the BUIDLai frontend.
#
# Deploy (after `wrangler login` or setting CLOUDFLARE_API_TOKEN):
#   npx wrangler pages deploy public --project-name=buidlai
#
# Static assets live in public/. Reverse proxies (/api/*, /atoc-data) are in
# functions/ as Pages Functions (replacing server.mjs, which Pages can't run).
name = "buidlai"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# Backend + upstream config (overridable in the Pages dashboard).
[vars]
TIPTAG_API_BASE = "https://bsc-api.tagai.fun"
ATOC_DATA_URL = "https://atocdashboard.tagclaw.com/data/dashboard-data.json"
