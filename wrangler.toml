name = "buidlai"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets served by the Worker via env.ASSETS.fetch()
[assets]
directory = "public"
binding = "ASSETS"
# Unmatched paths (e.g. /hub, /atoc) return index.html so client-side routing works
# — without this the asset layer 307-redirects unknown paths to "/".
not_found_handling = "single-page-application"
# Route every request through the Worker first so /api and /atoc-data are proxied
# before the asset layer can intercept them.
run_worker_first = true

# Non-secret runtime config (override in the dashboard for prod)
[vars]
TIPTAG_API_BASE = "https://bsc-api.tagai.fun"
ATOC_DATA_URL   = "https://atocdashboard.tagclaw.com/data/dashboard-data.json"

# Custom domain — Worker handles all traffic for buidlai.online
[[routes]]
pattern = "buidlai.online/*"
zone_name = "buidlai.online"

# www → handled by the Worker too (it 301-redirects www to the apex)
[[routes]]
pattern = "www.buidlai.online/*"
zone_name = "buidlai.online"
