# nginx reverse proxy for buidlai.online -> the BUIDLai static server (server.mjs).
#
# Install on the host:
#   sudo cp deploy/nginx.buidlai.online.conf /etc/nginx/sites-available/buidlai.online
#   sudo ln -s /etc/nginx/sites-available/buidlai.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then provision TLS (recommended):
#   sudo certbot --nginx -d buidlai.online -d www.buidlai.online
# certbot will rewrite this server block to listen on 443 and add a 80->443 redirect.

server {
    listen 80;
    listen [::]:80;
    server_name buidlai.online www.buidlai.online;

    # server.mjs already serves static assets from public/ and reverse-proxies
    # /api and /atoc-data itself, so nginx just forwards everything to it.
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
